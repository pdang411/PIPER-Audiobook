services:
  piper-tts:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: piper_tts_server
    ports:
      - "5000:5000"
    environment:
      - MODEL=en_US-lessac-medium
      - DATA_DIR=/app/data
      - HOST=0.0.0.0
      - PORT=5000
      - USE_CUDA=false
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  pdf-reader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf_audiobook_reader
    ports:
      - "8501:8501"
    environment:
      - TTS_BASE_URL=http://piper-tts:5000
      - LLM_BASE_URL=http://localhost:11434
      - LLM_MODEL=llama3
    volumes:
      - .:/app
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      piper-tts:
        condition: service_healthy
    command: >
      sh -c "pip install --no-cache-dir streamlit && 
             streamlit run app.py --server.address=0.0.0.0 --server.port=8501 --server.headless=true"
